<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoUnbox - Premium Case Opening</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #0a0d14;
            --bg-nav: #0f1219;
            --bg-card: #151a23;
            --bg-card-hover: #1b222d;

            --text-main: #ffffff;
            --text-muted: #8b92a5;
            --border-light: rgba(255, 255, 255, 0.05);

            --btn-open-bg: #4ade80;
            --btn-open-text: #ffffff;
            --btn-open-hover: #22c55e;

            --btn-demo-bg: #374151;
            --btn-demo-text: #e2e8f0;
            --btn-demo-hover: #4b5563;

            --common: #9ca3af;
            --rare: #3b82f6;
            --epic: #a855f7;
            --legendary: #ef4444;
            --gold-spin: #facc15;

            /* single source of truth for reel item width (JS reads this) */
            --reel-item-width: 220px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            color: var(--text-main);
            overflow-x: hidden;
            font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: transparent;
        }

        /* --- DYNAMIC STARFIELD CANVAS --- */
        #starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
            background-color: #06080e;
        }

        /* --- NAVBAR --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 2.5rem; background: var(--bg-nav);
            border-bottom: 1px solid var(--border-light);
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-left { display: flex; align-items: center; gap: 3rem; }
        .logo {
            font-size: 1.3rem; font-weight: 800; color: var(--text-main);
            display: flex; align-items: center; gap: 0.6rem; cursor: pointer; letter-spacing: -0.5px;
        }
        .nav-links { display: flex; gap: 2rem; font-size: 0.95rem; font-weight: 600; color: var(--text-muted); }
        .nav-links a { cursor: pointer; transition: 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--text-main); }

        .nav-right { display: flex; align-items: center; gap: 0.75rem; }

        .cart-btn {
            background: #2a2d33; color: white; padding: 0.5rem 1rem;
            border-radius: 6px; font-size: 0.9rem; font-weight: 600;
            display: flex; align-items: center; gap: 0.5rem; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.2s;
        }
        .cart-btn:hover { background: #33373e; }
        .cart-badge { background: white; color: black; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 800; }

        .wallet-btn {
            background: #3b82f6;
            color: white; padding: 0.6rem 1.2rem;
            border-radius: 6px; font-size: 1rem; font-weight: 600;
            cursor: pointer; border: none; transition: 0.2s;
        }
        .wallet-btn:hover { background: #2563eb; }
        .profile-btn { width: 34px; height: 34px; border-radius: 50%; background: #2a2d33; display:flex; align-items:center; justify-content:center; }

        /* --- LAYOUT --- */
        main { max-width: 1200px; margin: 0 auto; padding: 3rem 1.5rem; position: relative; z-index: 10; }
        .page { display: none; }
        .page.active { display: block; }

        .back-link {
            color: var(--text-muted); font-size: 0.9rem; cursor: pointer;
            margin-bottom: 2rem; display: inline-block; font-weight: 600;
        }
        .back-link:hover { color: var(--text-main); }

        /* --- PURE CSS PACK DESIGN --- */
        .css-pack {
            width: 160px;
            height: 230px;
            background: linear-gradient(135deg, var(--c1), var(--c2));
            border-radius: 4px;
            position: relative;
            margin: 0 auto 0.5rem auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, filter 0.2s;
            overflow: hidden;
        }
        .css-pack::before, .css-pack::after {
            content: ''; position: absolute; left: 0; width: 100%; height: 12px;
            background: repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
            z-index: 5;
        }
        .css-pack::before { top: 0; border-bottom: 1px solid rgba(0,0,0,0.2); }
        .css-pack::after { bottom: 0; border-top: 1px solid rgba(0,0,0,0.2); }

        .pack-notch-left, .pack-notch-right {
            position: absolute; top: 25px; width: 4px; height: 4px;
            background: #04060a; border-radius: 10px; z-index: 10;
        }
        .pack-notch-left { left: -2px; }
        .pack-notch-right { right: -2px; }

        .pack-items-container {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; height: 100px; display: flex; justify-content: center; align-items: center;
            z-index: 5; pointer-events: none;
        }
        .pack-item-img {
            width: 65px; height: 65px; object-fit: contain; position: absolute;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.6));
        }
        .pack-item-img:nth-child(1) { transform: rotate(-15deg) translateX(-15px); z-index: 1; }
        .pack-item-img:nth-child(2) { transform: rotate(10deg) translateX(15px); z-index: 2; width: 75px; height: 75px;}

        .css-pack-inner {
            margin: 12px 10px;
            flex: 1;
            background: linear-gradient(to bottom, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 40%, rgba(0,0,0,0.2) 100%);
            border-radius: 4px;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.4), inset 0 -5px 15px rgba(0,0,0,0.4);
            display: flex; justify-content: center; align-items: flex-start;
            padding-top: 20px; position: relative; z-index: 2;
        }
        .css-pack-name {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            color: white; font-weight: 800; font-size: 0.95rem; text-align: center; text-transform: uppercase;
            line-height: 1.1; text-shadow: 0 2px 5px rgba(0,0,0,0.8); z-index: 20; padding: 0 5px;
        }

        /* --- SPINNER SECTION (LEFT-ALIGNED) --- */
        .spinner-section { text-align: left; margin-bottom: 4rem; padding-top: 0; }

        .opening-header { display: flex; align-items: flex-end; gap: 1.25rem; margin: 0.25rem 0 2.25rem; }
        .opening-pack { width: 99px; height: 142px; flex-shrink: 0; }
        .opening-pack .css-pack { transform: scale(0.62); transform-origin: top left; margin: 0; }
        .opening-meta { display: flex; flex-direction: column; padding-bottom: 6px; }

        .case-header-title { font-size: 1.9rem; font-weight: 800; letter-spacing: -0.5px; margin: 0; color: var(--text-main); }
        .case-header-subtitle { font-size: 0.95rem; color: var(--text-muted); font-weight: 600; margin: 0.3rem 0 0; }

        .spinners-container-stack {
            display: flex; flex-direction: column; gap: 1rem; margin: 2rem 0; width: 100%;
            min-height: 200px;
        }

        .reel-container {
            position: relative; width: 100%; height: 260px; overflow: hidden;
            background: radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, transparent 70%);
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.02);
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }

        /* small top/bottom arrows mark the stopping point (no center line) */
        .center-triangle-top, .center-triangle-bottom {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; z-index: 200; transition: opacity 0.2s; opacity: 0;
        }
        .center-triangle-top { top: 0; border-left: 7px solid transparent; border-right: 7px solid transparent; border-top: 11px solid var(--gold-spin); }
        .center-triangle-bottom { bottom: 0; border-left: 7px solid transparent; border-right: 7px solid transparent; border-bottom: 11px solid var(--gold-spin); }

        .reel-track { display: flex; height: 100%; width: max-content; align-items: center; }

        /* width MUST match JS itemWidth (var --reel-item-width) so the winner lands centered */
        .spin-item {
            width: var(--reel-item-width); height: 100%; flex-shrink: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative;
            transition: transform 0.15s ease-out, opacity 0.3s ease; z-index: 1;
        }
        .spin-item img {
            width: 60%; height: 110px; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); z-index: 10; margin-bottom: 34px; position: relative;
        }
        .spin-item::before {
            content: ''; position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%);
            width: 90px; height: 90px; background: var(--rarity); filter: blur(28px);
            opacity: 0; z-index: 0; border-radius: 50%; transition: all 0.15s ease-out; pointer-events: none;
        }
        .spin-item.active { transform: scale(1.08); z-index: 50; }
        .spin-item.active::before { opacity: 0.55; filter: blur(30px); width: 110px; height: 110px;}
        /* WINNER: stays centered + keeps its glow once the reel stops */
        .spin-item.winner { transform: scale(1.15); z-index: 60; }
        .spin-item.winner::before { opacity: 1; transform: translate(-50%, -50%); width: 130px; height: 130px; filter: blur(34px); }

        .spin-item-info {
            position: absolute; bottom: 34px; width: 100%; text-align: center;
            opacity: 0; transform: translateY(8px); transition: all 0.3s ease; z-index: 20;
        }
        .spin-item.winner .spin-item-info { opacity: 1; transform: translateY(0); }
        .spin-item-name { font-size: 0.9rem; font-weight: 700; color: var(--text-main); margin-bottom: 3px; }
        .spin-item-price { font-size: 1.1rem; font-weight: 800; color: var(--gold-spin); }

        /* --- CONTROLS --- */
        .controls-row { display: flex; justify-content: center; align-items: center; gap: 0.75rem; margin-top: 1rem; border-bottom: 1px solid var(--border-light); padding-bottom: 3rem;}

        .qty-selector {
            display: flex; align-items: center; background: #262a33; border-radius: 6px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05); height: 44px; margin-right: 1rem;
        }
        .qty-btn {
            background: transparent; border: none; color: var(--text-muted); width: 36px; height: 100%;
            font-size: 1.2rem; font-weight: 500; cursor: pointer; transition: 0.2s;
        }
        .qty-btn:hover { background: rgba(255,255,255,0.1); color: white;}
        .qty-text { color: white; padding: 0 12px; font-weight: 700; font-size: 0.95rem; min-width: 40px; text-align: center;}

        .btn-open {
            background: var(--btn-open-bg); color: var(--btn-open-text); font-weight: 700; border: none;
            padding: 0 2.2rem; height: 44px; border-radius: 6px; cursor: pointer; font-size: 1.05rem; transition: 0.2s;
        }
        .btn-open:hover:not(:disabled) { background: var(--btn-open-hover); }
        .btn-open:disabled { filter: brightness(0.6); cursor: not-allowed; }

        .btn-demo {
            background: var(--btn-demo-bg); color: var(--btn-demo-text); font-weight: 700;
            border: none; padding: 0 1.8rem; height: 44px; border-radius: 6px; cursor: pointer; font-size: 1.05rem; transition: 0.2s;
        }
        .btn-demo:hover:not(:disabled) { background: var(--btn-demo-hover); color: white; }
        .btn-demo:disabled { filter: brightness(0.6); cursor: not-allowed; }

        .fast-mode-toggle {
            background: transparent; border: none; color: var(--text-muted); cursor: pointer;
            padding: 0.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; margin-left: 1rem;
        }
        .fast-mode-toggle.active { color: var(--gold-spin); background: rgba(250, 204, 21, 0.1); }
        .fast-mode-toggle svg { width: 20px; height: 20px; fill: currentColor; }

        #spin-result-msg { text-align: center; margin-bottom: 1rem; font-weight: 800; min-height: 28px; font-size: 1.2rem;}

        /* --- PACK CONTENTS GRID --- */
        .section-title { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 1.5rem; color: var(--text-main); }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 3rem;}
        .grid-item {
            background: var(--bg-card); border-radius: 8px; padding: 1.5rem 1rem;
            display: flex; flex-direction: column; align-items: center; position: relative;
            border: 1px solid var(--border-light); transition: 0.2s; cursor: default;
            overflow: hidden;
        }
        .grid-item:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.2); }

        .grid-item::before {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; background: var(--rarity); filter: blur(30px);
            opacity: 0.15; z-index: 1; pointer-events: none;
        }

        .item-odds { font-size: 0.75rem; font-weight: 700; color: #cbd5e1; margin-bottom: 1rem; text-align: center; width: 100%; z-index: 5;}
        .grid-item img { width: 90px; height: 90px; object-fit: contain; margin-bottom: 1rem; z-index: 2; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
        .item-name { font-size: 0.8rem; font-weight: 500; color: var(--text-muted); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; margin-bottom: 0.2rem; z-index: 5;}
        .item-price { font-size: 0.95rem; font-weight: 800; color: var(--text-main); z-index: 5;}

        /* --- PACKS BROWSER --- */
        .browse-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
        .browse-card {
            background: transparent; border: none; padding: 1.5rem;
            display: flex; flex-direction: column; align-items: center;
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        .browse-card:hover .css-pack { transform: translateY(-8px) scale(1.02); filter: brightness(1.1); }
        .browse-card .price { color: var(--text-main); font-weight: 700; font-size: 1.1rem; margin-top: 0.5rem;}

        .fallback-red { width: 80%; height: 80%; border: 1px dashed #ef4444; display: flex; align-items: center; justify-content: center; color: #ef4444; font-size: 0.75rem; font-weight: 600; text-align: center; word-break: break-all; border-radius: 8px; z-index: 10; position: relative;}

        @media (max-width: 640px) {
            nav { padding: 1rem 1.25rem; }
            .nav-left { gap: 1.25rem; }
            .opening-header { gap: 1rem; }
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <nav>
        <div class="nav-left">
            <div class="logo" onclick="showPage('browser')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 16.5C21 16.88 20.79 17.21 20.47 17.38L12.57 21.82C12.2 22.02 11.75 22.02 11.39 21.82L3.46 17.38C3.14 17.21 2.93 16.88 2.93 16.5V7.5C2.93 7.12 3.14 6.79 3.46 6.62L11.39 2.18C11.75 1.98 12.2 1.98 12.57 2.18L20.47 6.62C20.79 6.79 21 7.12 21 7.5V16.5Z" fill="#ffffff"/>
                </svg>
                RoUnbox
            </div>
            <div class="nav-links">
                <a class="active" onclick="showPage('browser')" id="nav-browser">Packs</a>
                <a onclick="showPage('inventory')" id="nav-inventory">Inventory</a>
            </div>
        </div>
        <div class="nav-right">
            <button class="cart-btn" onclick="showPage('inventory')">
                Cart <div class="cart-badge" id="inv-count">0</div>
            </button>
            <button class="wallet-btn" onclick="addBalance(100)">
                $ <span id="bal-display">0.00</span>
            </button>
            <div class="profile-btn">☻</div>
        </div>
    </nav>

    <main>
        <div id="page-browser" class="page active">
            <h2 class="section-title">Packs</h2>
            <div class="browse-grid" id="browse-grid"></div>
        </div>

        <div id="page-opening" class="page">
            <div class="back-link" onclick="showPage('browser')">← Back to Packs</div>

            <div class="spinner-section">
                <div class="opening-header">
                    <div class="opening-pack" id="case-header-pack"></div>
                    <div class="opening-meta">
                        <h1 class="case-header-title" id="case-header-name">Pack Name</h1>
                        <p class="case-header-subtitle">Opening Simulation</p>
                    </div>
                </div>

                <div class="spinners-container-stack" id="spinners-stack"></div>
                <div id="spin-result-msg"></div>

                <div class="controls-row">
                    <div class="qty-selector">
                        <button class="qty-btn" onclick="changeQty(-1)">−</button>
                        <span class="qty-text" id="qty-display">x1</span>
                        <button class="qty-btn" onclick="changeQty(1)">+</button>
                    </div>
                    <button class="btn-open" id="btn-open" onclick="roll(false)">Open for $0.00</button>
                    <button class="btn-demo" id="btn-demo" onclick="roll(true)">Demo</button>

                    <button class="fast-mode-toggle" id="btn-fast" onclick="toggleFastMode()" title="Fast Mode">
                        <svg viewBox="0 0 24 24"><path d="M13 2.05v9h7.45l-11.5 11.5v-9H1.55L13 2.05z"/></svg>
                    </button>
                </div>
            </div>

            <h2 class="section-title">Pack Contents</h2>
            <div class="items-grid" id="pack-grid"></div>
        </div>

        <div id="page-inventory" class="page">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 class="section-title" style="margin:0;">Your Inventory</h2>
                <button class="btn-demo" style="color: #ef4444; border-color: transparent;" onclick="sellAll()">Sell All</button>
            </div>
            <div class="items-grid" id="inventory-grid"></div>
        </div>
    </main>

    <script>
        // --- WEB AUDIO API ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTick() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        function playWin() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.setValueAtTime(554.37, audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
            osc.start(); osc.stop(audioCtx.currentTime + 1);
        }

        // --- STARFIELD CANVAS ENGINE (calm) ---
        function initStars() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let stars = [];
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize); resize();
            const colors = ['#ffffff', '#ffffff', '#ffffff', '#ffffff', '#cbd5e1'];
            const MAX_ALPHA = 0.32;
            for (let i = 0; i < 34; i++) {
                stars.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 0.7 + 0.25,
                    vx: (Math.random() - 0.5) * 0.04, vy: (Math.random() - 0.5) * 0.04, alpha: Math.random() * 0.22,
                    dAlpha: (Math.random() * 0.0035 + 0.0012) * (Math.random() < 0.5 ? 1 : -1),
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(s => {
                    s.x += s.vx; s.y += s.vy; s.alpha += s.dAlpha;
                    if (s.alpha <= 0) { s.alpha = 0; s.dAlpha *= -1; s.x = Math.random() * canvas.width; s.y = Math.random() * canvas.height; }
                    else if (s.alpha >= MAX_ALPHA) { s.alpha = MAX_ALPHA; s.dAlpha *= -1; }
                    if (s.x < 0) s.x = canvas.width; if (s.x > canvas.width) s.x = 0;
                    if (s.y < 0) s.y = canvas.height; if (s.y > canvas.height) s.y = 0;
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = s.color; ctx.globalAlpha = s.alpha; ctx.fill();
                });
                ctx.globalAlpha = 1.0;
                requestAnimationFrame(draw);
            }
            draw();
        }
        initStars();

        // --- IMAGE REGISTRY (your local assets) ---
        const IMAGES = {
            dirt: "assets/images/items/dirt.png",
            "1-dollar-bill": "assets/images/items/1-dollar-bill.png",
            gold: "assets/images/items/gold.png",
            mousepad: "assets/images/items/mousepad.png",
            usbdrive: "assets/images/items/usb-drive.png",
            mouse: "assets/images/items/gaming-mouse.png",
            keyboard: "assets/images/items/mechanical-keyboard.png",
            airpods: "assets/images/items/airpods.png",
            controller: "assets/images/items/xbox-controller.png",
            switch: "assets/images/items/nintendo-switch.png",
            ps5: "assets/images/items/ps5.png",
            rolex: "assets/images/items/rolex.png",
            rtx: "assets/images/items/rtx4090.png"
        };

        // --- MASTER ITEM LIST (each case picks its own subset) ---
        const ITEMS = {
            dirt:       { name: 'Dirt',             price: 0.50,     imgKey: 'dirt',          rarity: 'common' },
            dollar:     { name: '1 Dollar Bill',    price: 1.00,     imgKey: '1-dollar-bill', rarity: 'common' },
            mousepad:   { name: 'Mousepad',         price: 2.50,     imgKey: 'mousepad',      rarity: 'common' },
            usb:        { name: 'USB Drive',        price: 5.00,     imgKey: 'usbdrive',      rarity: 'common' },
            mouse:      { name: 'Gaming Mouse',     price: 50.00,    imgKey: 'mouse',         rarity: 'rare' },
            keyboard:   { name: 'Mech Keyboard',    price: 120.00,   imgKey: 'keyboard',      rarity: 'rare' },
            airpods:    { name: 'AirPods',          price: 159.00,   imgKey: 'airpods',       rarity: 'epic' },
            controller: { name: 'Xbox Controller',  price: 69.99,    imgKey: 'controller',    rarity: 'epic' },
            nswitch:    { name: 'Nintendo Switch',  price: 299.99,   imgKey: 'switch',        rarity: 'epic' },
            ps5:        { name: 'PlayStation 5',    price: 499.99,   imgKey: 'ps5',           rarity: 'legendary' },
            rtx:        { name: 'RTX 4090',         price: 1599.00,  imgKey: 'rtx',           rarity: 'legendary' },
            rolex:      { name: 'Rolex Watch',      price: 15000.00, imgKey: 'rolex',         rarity: 'legendary' }
        };
        function getItem(id) { return { ...ITEMS[id], id }; }
        function goldToken() { return { id: 'GOLD', name: 'Gold Spin', price: 0, imgKey: 'gold', rarity: 'gold-spin', isToken: true }; }

        /* Each case has its own pools:
           normal: [ [itemId, weight], ... , ['GOLD', weight] ]   (what you can pull; GOLD = re-spin)
           gold:   [ [itemId, weight], ... ]                       (premium pool unlocked by a Gold Spin)   */
        const CASES = [
            {
                id: 'dirtcheap', name: 'Dirt Cheap', price: 1.00,
                c1: '#6b7280', c2: '#374151', displayItems: ['dirt', '1-dollar-bill'],
                normal: [['dirt', 58], ['dollar', 30], ['mousepad', 8], ['usb', 3], ['GOLD', 1]],
                gold:   [['controller', 56], ['airpods', 30], ['nswitch', 13], ['ps5', 1]]
            },
            {
                id: 'pocket', name: 'Pocket Change', price: 3.00,
                c1: '#22c55e', c2: '#14532d', displayItems: ['1-dollar-bill', 'mousepad'],
                normal: [['dollar', 38], ['dirt', 26], ['mousepad', 22], ['usb', 10], ['mouse', 2], ['GOLD', 2]],
                gold:   [['airpods', 46], ['controller', 34], ['nswitch', 18], ['ps5', 2]]
            },
            {
                id: 'tech', name: 'Tech Starter Pack', price: 25.00,
                c1: '#3b82f6', c2: '#1e3a8a', displayItems: ['mouse', 'mousepad'],
                normal: [['mousepad', 34], ['usb', 24], ['dollar', 16], ['mouse', 16], ['keyboard', 6], ['GOLD', 4]],
                gold:   [['airpods', 45], ['controller', 30], ['nswitch', 20], ['ps5', 5]]
            },
            {
                id: 'desk', name: 'Desk Setup', price: 40.00,
                c1: '#0ea5e9', c2: '#0c4a6e', displayItems: ['mouse', 'keyboard'],
                normal: [['usb', 30], ['mousepad', 24], ['mouse', 22], ['keyboard', 12], ['dollar', 8], ['GOLD', 4]],
                gold:   [['controller', 42], ['airpods', 33], ['nswitch', 25]]
            },
            {
                id: 'gamer', name: 'Gamer Elite Pack', price: 150.00,
                c1: '#10b981', c2: '#064e3b', displayItems: ['controller', 'switch'],
                normal: [['usb', 24], ['mouse', 24], ['keyboard', 22], ['airpods', 15], ['controller', 10], ['GOLD', 5]],
                gold:   [['nswitch', 38], ['ps5', 35], ['rtx', 22], ['rolex', 5]]
            },
            {
                id: 'console', name: 'Console Vault', price: 300.00,
                c1: '#a855f7', c2: '#4c1d95', displayItems: ['ps5', 'switch'],
                normal: [['keyboard', 26], ['mouse', 22], ['controller', 20], ['airpods', 17], ['nswitch', 10], ['GOLD', 5]],
                gold:   [['ps5', 45], ['nswitch', 22], ['rtx', 28], ['rolex', 5]]
            },
            {
                id: 'luxury', name: 'Actively Managed Flex', price: 500.00,
                c1: '#f59e0b', c2: '#78350f', displayItems: ['rolex', 'ps5'],
                normal: [['airpods', 30], ['controller', 24], ['nswitch', 19], ['mouse', 14], ['ps5', 8], ['GOLD', 5]],
                gold:   [['rtx', 38], ['ps5', 28], ['rolex', 34]]
            },
            {
                id: 'royale', name: 'Jackpot Royale', price: 1000.00,
                c1: '#ef4444', c2: '#7f1d1d', displayItems: ['rolex', 'rtx'],
                normal: [['nswitch', 28], ['ps5', 24], ['controller', 18], ['airpods', 16], ['rtx', 9], ['GOLD', 5]],
                gold:   [['rtx', 40], ['rolex', 35], ['ps5', 25]]
            }
        ];

        let balance = 0.00;
        let inventory = [];
        let activeCase = null;
        let isSpinning = false;
        let fastMode = false;
        let openQty = 1;
        let activeReelTrackers = [];

        const ITEM_WIDTH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--reel-item-width')) || 220;

        const loadedImages = {};
        for (let key in IMAGES) {
            let img = new Image();
            img.onload = () => loadedImages[key] = true;
            img.onerror = () => loadedImages[key] = false;
            img.src = IMAGES[key];
        }

        function updateUI() {
            document.getElementById('bal-display').innerText = balance.toFixed(2);
            document.getElementById('inv-count').innerText = inventory.length;
            renderInventory();
        }

        function showPage(pageId) {
            if (isSpinning) return;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            if (document.getElementById(`nav-${pageId}`)) document.getElementById(`nav-${pageId}`).classList.add('active');
        }

        function addBalance(amt) { balance += amt; updateUI(); }

        function toggleFastMode() {
            fastMode = !fastMode;
            document.getElementById('btn-fast').classList.toggle('active', fastMode);
        }

        function setButtonsState(disabled) {
            document.getElementById('btn-open').disabled = disabled;
            document.getElementById('btn-demo').disabled = disabled;
            document.querySelectorAll('.qty-btn').forEach(btn => btn.disabled = disabled);
        }

        function changeQty(amount) {
            if (isSpinning) return;
            openQty = Math.max(1, Math.min(5, openQty + amount));
            document.getElementById('qty-display').innerText = `x${openQty}`;
            if (activeCase) { updateOpenButtonText(); populateIdleSpinnerLayout(); }
        }

        function updateOpenButtonText() {
            const totalPrice = activeCase.price * openQty;
            document.getElementById('btn-open').innerText = `Open for $${totalPrice.toFixed(2)}`;
        }

        function createCSSPackHTML(c) {
            let imagesHTML = '';
            if (c.displayItems && c.displayItems.length > 0) {
                imagesHTML = '<div class="pack-items-container">';
                c.displayItems.forEach(imgKey => {
                    imagesHTML += `<img src="${IMAGES[imgKey]}" class="pack-item-img" onerror="this.style.display='none'">`;
                });
                imagesHTML += '</div>';
            }
            return `
                <div class="css-pack" style="--c1: ${c.c1}; --c2: ${c.c2};">
                    <div class="pack-notch-left"></div>
                    <div class="pack-notch-right"></div>
                    ${imagesHTML}
                    <div class="css-pack-inner"></div>
                    <div class="css-pack-name">${c.name}</div>
                </div>
            `;
        }

        function renderImage(imgKey) {
            if (!imgKey) return '';
            if (loadedImages[imgKey] !== false) {
                return `<img src="${IMAGES[imgKey]}" draggable="false">`;
            } else {
                return `<div class="fallback-red">MISSING FILE<br>${IMAGES[imgKey].split('/').pop()}</div>`;
            }
        }

        function createSpinItemHTML(item) {
            const priceText = item.isToken ? 'Gold Spin' : `$${item.price.toFixed(2)}`;
            return `
                <div class="spin-item" style="--rarity: var(--${item.rarity})">
                    ${renderImage(item.imgKey)}
                    <div class="spin-item-info">
                        <div class="spin-item-name">${item.name}</div>
                        <div class="spin-item-price">${priceText}</div>
                    </div>
                </div>
            `;
        }

        function renderBrowser() {
            const grid = document.getElementById('browse-grid');
            grid.innerHTML = '';
            CASES.forEach(c => {
                const card = document.createElement('div');
                card.className = 'browse-card';
                card.innerHTML = `${createCSSPackHTML(c)}<div class="price">$${c.price.toFixed(2)}</div>`;
                card.onclick = () => openCaseView(c);
                grid.appendChild(card);
            });
        }

        function openCaseView(c) {
            activeCase = c;
            openQty = 1;
            document.getElementById('qty-display').innerText = `x1`;
            showPage('opening');

            document.getElementById('case-header-pack').innerHTML = createCSSPackHTML(c);
            document.getElementById('case-header-name').innerText = `${c.name}`;
            updateOpenButtonText();
            document.getElementById('spin-result-msg').innerText = '';

            // --- absolute odds for this case ---
            const normalTotal = c.normal.reduce((a, [, w]) => a + w, 0);
            const goldEntry = c.normal.find(e => e[0] === 'GOLD');
            const goldProb = goldEntry ? goldEntry[1] / normalTotal : 0;
            const goldTotal = c.gold.reduce((a, [, w]) => a + w, 0);

            const probMap = {};
            c.normal.forEach(([id, w]) => { if (id === 'GOLD') return; probMap[id] = (probMap[id] || 0) + w / normalTotal; });
            c.gold.forEach(([id, w]) => { probMap[id] = (probMap[id] || 0) + goldProb * (w / goldTotal); });

            const allItems = Object.keys(probMap).map(id => ({ ...ITEMS[id], id, absProb: probMap[id] * 100 }));
            allItems.sort((a, b) => b.price - a.price);

            const grid = document.getElementById('pack-grid');
            grid.innerHTML = '';
            allItems.forEach(item => {
                let displayOdds = item.absProb < 1 ? item.absProb.toFixed(4) + '%' : item.absProb.toFixed(2) + '%';
                grid.innerHTML += `
                    <div class="grid-item" style="--rarity: var(--${item.rarity})">
                        <div class="item-odds">${displayOdds}</div>
                        ${renderImage(item.imgKey)}
                        <div class="item-name">${item.name}</div>
                        <div class="item-price">$${item.price.toFixed(2)}</div>
                    </div>
                `;
            });

            populateIdleSpinnerLayout();
        }

        // --- STACKED SPINNER SETUP (no center line, just arrows) ---
        function populateIdleSpinnerLayout(forceQuantity = null) {
            const stack = document.getElementById('spinners-stack');
            stack.innerHTML = '';
            activeReelTrackers = [];
            const rowsToDraw = forceQuantity || openQty;

            const idleIds = activeCase ? activeCase.normal.filter(e => e[0] !== 'GOLD').map(e => e[0]) : ['dirt', 'dollar', 'mousepad', 'usb'];

            for (let q = 0; q < rowsToDraw; q++) {
                const reelId = `reel-${q}`;
                stack.innerHTML += `
                    <div class="reel-container" id="container-${reelId}">
                        <div class="center-triangle-top" id="arrow-top-${reelId}"></div>
                        <div class="center-triangle-bottom" id="arrow-bot-${reelId}"></div>
                        <div class="reel-track" id="track-${reelId}"></div>
                    </div>
                `;
                const track = document.getElementById(`track-${reelId}`);
                for (let i = 0; i < 15; i++) {
                    const id = idleIds[Math.floor(Math.random() * idleIds.length)];
                    track.innerHTML += createSpinItemHTML(getItem(id));
                }
            }
        }

        function trackActiveItemStacked(trackElem, containerElem, reelIndex, isAudioLeader) {
            const containerRect = containerElem.getBoundingClientRect();
            const centerPoint = containerRect.left + (containerRect.width / 2);
            let currentActiveIndex = -1;
            function loop() {
                if (!isSpinning) return;
                const items = trackElem.children;
                for (let i = 0; i < items.length; i++) {
                    const rect = items[i].getBoundingClientRect();
                    if (rect.left <= centerPoint && rect.right >= centerPoint) {
                        if (!items[i].classList.contains('active')) {
                            for (let j = 0; j < items.length; j++) items[j].classList.remove('active');
                            items[i].classList.add('active');
                            if (currentActiveIndex !== i) { currentActiveIndex = i; if (isAudioLeader) playTick(); }
                        }
                        break;
                    }
                }
                activeReelTrackers[reelIndex] = requestAnimationFrame(loop);
            }
            loop();
        }

        // weighted draw from the active case's pool
        function getDrop(caseObj, isDemo, isGoldPool) {
            const base = isGoldPool ? caseObj.gold : caseObj.normal;
            const entries = base.map(([id, w]) => {
                let ww = w;
                if (isDemo && !isGoldPool) { ww = (id === 'GOLD') ? w * 20 : w * 0.6; }
                if (isDemo && isGoldPool && ITEMS[id] && ITEMS[id].rarity === 'legendary') ww = w * 5;
                return [id, ww];
            });
            const total = entries.reduce((a, [, w]) => a + w, 0);
            let rand = Math.random() * total;
            for (const [id, w] of entries) {
                if ((rand -= w) <= 0) return id === 'GOLD' ? goldToken() : getItem(id);
            }
            const last = entries[entries.length - 1][0];
            return last === 'GOLD' ? goldToken() : getItem(last);
        }

        function runMultiReelAnimation(isDemo, isGoldPool, rowsToSpin, callback) {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const stack = document.getElementById('spinners-stack');
            const WIN_INDEX = 50;
            const wheelsData = [];

            for (let q = 0; q < rowsToSpin; q++) {
                const reelId = `reel-${q}`;
                const track = document.getElementById(`track-${reelId}`);
                const container = document.getElementById(`container-${reelId}`);

                document.getElementById(`arrow-top-${reelId}`).style.opacity = '1';
                document.getElementById(`arrow-bot-${reelId}`).style.opacity = '1';
                track.style.transition = 'none';
                track.style.transform = 'translateX(0)';
                track.innerHTML = '';

                const items = [];
                for (let i = 0; i < 70; i++) {
                    let item = getDrop(activeCase, isDemo, isGoldPool);
                    // near-miss tease: a Gold Spin right beside the winning slot
                    if (!isGoldPool && (i === WIN_INDEX - 1 || i === WIN_INDEX + 1) && Math.random() < 0.7) item = goldToken();
                    items.push(item);
                }
                const wonItem = getDrop(activeCase, isDemo, isGoldPool);
                items[WIN_INDEX] = wonItem;

                items.forEach(item => { track.innerHTML += createSpinItemHTML(item); });
                wheelsData.push({ track, container, wonItem, reelId });
            }

            void stack.offsetHeight;

            const duration = fastMode ? 1000 : 4500;

            wheelsData.forEach((wheel, index) => {
                const containerWidth = wheel.container.offsetWidth;
                const randomOffset = (Math.random() * (ITEM_WIDTH * 0.5)) - (ITEM_WIDTH * 0.25);
                const stopPointWithOffset = (WIN_INDEX * ITEM_WIDTH) - (containerWidth / 2) + (ITEM_WIDTH / 2) + randomOffset;
                wheel.track.style.transition = `transform ${duration}ms cubic-bezier(0.1, 0.8, 0.1, 1)`;
                wheel.track.style.transform = `translateX(-${stopPointWithOffset}px)`;
                trackActiveItemStacked(wheel.track, wheel.container, index, index === 0);
            });

            setTimeout(() => {
                wheelsData.forEach((wheel) => {
                    const containerWidth = wheel.container.offsetWidth;
                    const exactCenterPoint = (WIN_INDEX * ITEM_WIDTH) - (containerWidth / 2) + (ITEM_WIDTH / 2);
                    wheel.track.style.transition = `transform 0.4s ease-in-out`;
                    wheel.track.style.transform = `translateX(-${exactCenterPoint}px)`;
                });

                setTimeout(() => {
                    activeReelTrackers.forEach(id => cancelAnimationFrame(id));
                    const wonItemsList = [];
                    wheelsData.forEach((wheel) => {
                        const domItems = wheel.track.children;
                        for (let i = 0; i < domItems.length; i++) {
                            if (i !== WIN_INDEX) { domItems[i].style.opacity = '0'; domItems[i].classList.remove('active'); }
                            else { domItems[i].classList.remove('active'); domItems[i].classList.add('winner'); }
                        }
                        document.getElementById(`arrow-top-${wheel.reelId}`).style.opacity = '0';
                        document.getElementById(`arrow-bot-${wheel.reelId}`).style.opacity = '0';
                        wonItemsList.push(wheel.wonItem);
                    });
                    playWin();
                    callback(wonItemsList);
                }, 400);
            }, duration);
        }

        function roll(isDemo) {
            if (isSpinning || !activeCase) return;
            const totalPackCost = activeCase.price * openQty;
            if (!isDemo && balance < totalPackCost) return alert("Insufficient Balance!");

            isSpinning = true;
            setButtonsState(true);
            document.getElementById('spin-result-msg').innerText = '';

            if (!isDemo) { balance -= totalPackCost; updateUI(); }

            populateIdleSpinnerLayout(openQty);
            void document.getElementById('spinners-stack').offsetHeight;

            // Phase 1: Normal Spin
            runMultiReelAnimation(isDemo, false, openQty, (wonItems) => {
                const goldTokensHit = wonItems.filter(item => item.isToken).length;

                if (goldTokensHit > 0) {
                    // no "gold spin" text — just keep normal wins, then run the gold reel
                    if (!isDemo) {
                        wonItems.forEach(item => { if (!item.isToken) inventory.push(item); });
                        updateUI();
                    }
                    setTimeout(() => {
                        populateIdleSpinnerLayout(goldTokensHit);
                        void document.getElementById('spinners-stack').offsetHeight;

                        // Phase 2: Gold Spin (premium pool only)
                        runMultiReelAnimation(isDemo, true, goldTokensHit, (goldItems) => {
                            if (!isDemo) goldItems.forEach(gi => inventory.push(gi));
                            updateUI();
                            setTimeout(() => {
                                isSpinning = false;
                                setButtonsState(false);
                                populateIdleSpinnerLayout();
                            }, 2200);
                        });
                    }, 1200);
                } else {
                    if (!isDemo) wonItems.forEach(item => inventory.push(item));
                    updateUI();
                    isSpinning = false;
                    setButtonsState(false);
                }
            });
        }

        function renderInventory() {
            const grid = document.getElementById('inventory-grid');
            if (!grid) return;
            grid.innerHTML = '';
            inventory.forEach((item, idx) => {
                grid.innerHTML += `
                    <div class="grid-item" style="--rarity: var(--${item.rarity}); cursor:pointer" onclick="sellItem(${idx})">
                        <div class="item-odds" style="color:var(--btn-open-bg); font-weight: 800;">SELL ITEM</div>
                        ${renderImage(item.imgKey)}
                        <div class="item-name">${item.name}</div>
                        <div class="item-price">$${item.price.toFixed(2)}</div>
                    </div>
                `;
            });
        }
        function sellItem(idx) { balance += inventory[idx].price; inventory.splice(idx, 1); updateUI(); }
        function sellAll() { inventory.forEach(i => balance += i.price); inventory = []; updateUI(); }

        renderBrowser();
        updateUI();
    </script>
</body>
</html>
